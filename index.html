<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>R&L Plumb | Procurement Portal</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<div class="flex h-screen overflow-hidden">

        <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>

          <span class="text-xs font-semibold text-gray-500 uppercase mr-1">Show:</span>
          <button onclick="setFilter(3)"  id="filter-3"    class="filter-btn px-4 py-1.5 rounded-lg text-sm font-semibold bg-[#0f2d4a] text-white">Next 3 Days</button>
          <button onclick="setFilter(5)"  id="filter-5"    class="filter-btn px-4 py-1.5 rounded-lg text-sm font-medium text-gray-600 bg-white border border-gray-300 hover:border-gray-400">Next 5 Days</button>
          <button onclick="setFilter(7)"  id="filter-7"    class="filter-btn px-4 py-1.5 rounded-lg text-sm font-medium text-gray-600 bg-white border border-gray-300 hover:border-gray-400">Next 7 Days</button>

        <div id="custom-date-row" class="hidden flex items-center gap-2 mb-3 pl-1">
          <span class="text-xs text-gray-500 font-medium">From</span>
          <input type="date" id="custom-from" class="border border-gray-300 rounded-lg px-3 py-1.5 text-sm focus:outline-none focus:border-blue-400 bg-white">
          <span class="text-xs text-gray-500 font-medium">To</span>
          <input type="date" id="custom-to"   class="border border-gray-300 rounded-lg px-3 py-1.5 text-sm focus:outline-none focus:border-blue-400 bg-white">
          <button onclick="applyCustomFilter()" class="px-4 py-1.5 bg-[#0f2d4a] text-white text-sm font-semibold rounded-lg hover:bg-blue-900">Apply</button>
        </div>

        <div id="summary-bar" class="mb-4"></div>

        <!-- Select all -->

let collapsedCCs = new Set();

// ===== UTILITIES =====
function updateCartBadge() { document.getElementById('cart-badge').textContent = cart.length; }

function fmtDate(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  const diff = Math.round((d - TODAY) / 864e5);
  const s = d.toLocaleDateString('en-NZ', {weekday:'short', day:'numeric', month:'short'});
  if (diff === 0) return 'Today · ' + s;
  if (diff === 1) return 'Tomorrow · ' + s;
  return diff + ' days · ' + s;
}

function getFilteredCCs() {
  let start, end;
  if (currentFilter === 'custom' && customStart && customEnd) {
    start = new Date(customStart + 'T00:00:00');
    end   = new Date(customEnd   + 'T00:00:00');
  } else {
    start = new Date(TODAY);
    end   = new Date(TODAY);
    end.setDate(end.getDate() + (currentFilter === 99 ? 365 : currentFilter));
  }
  const result = [];
  jobs.forEach(job => job.costCentres.forEach(cc => {
    const d = new Date(cc.scheduledDate + 'T00:00:00');
    if (d >= start && d <= end) result.push({cc, job});
  }));
  result.sort((a,b) => new Date(a.cc.scheduledDate) - new Date(b.cc.scheduledDate));
  return result;
}

function getAllFilteredMatIds() { return getFilteredCCs().flatMap(({cc}) => cc.materials.map(m => m.id)); }

function findMat(matId) {
  for (const job of jobs) for (const cc of job.costCentres) {
    const mat = cc.materials.find(m => m.id === matId);
    if (mat) return {mat, cc, job};
  }
  return null;
}

function showToast(msg) {
  const t = document.createElement('div');
  t.className = 'fixed top-4 right-4 bg-gray-900 text-white text-sm px-4 py-2.5 rounded-lg shadow-lg z-[999]';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => { t.style.opacity='0'; t.style.transition='opacity 0.3s'; setTimeout(()=>t.remove(),300); }, 2200);
}

// ===== NAVIGATION =====
function navigate(view) {
  document.querySelectorAll('[id^="view-"]').forEach(v => v.classList.add('hidden'));
  document.querySelectorAll('.nav-item').forEach(n => { n.classList.remove('bg-blue-700','text-white'); n.classList.add('text-blue-200'); });
  const views = {ccs:'view-ccs', 'bulk-order':'view-bulk-order', pos:'view-pos', stock:'view-stock'};
  const navs  = {ccs:'nav-ccs', 'bulk-order':'nav-pos', pos:'nav-pos', stock:'nav-stock'};
  const titles = {ccs:'Scheduled Cost Centres', 'bulk-order':'Bulk Order', pos:'Purchase Orders', stock:'Stock'};
  document.getElementById(views[view]).classList.remove('hidden');
  const nav = document.getElementById(navs[view]);
  if (nav) { nav.classList.add('bg-blue-700','text-white'); nav.classList.remove('text-blue-200'); }
  document.getElementById('breadcrumb').textContent = titles[view];
  if (view === 'ccs') renderCCList();
  if (view === 'bulk-order') renderBulkOrder();
  if (view === 'pos') renderPOs();
  if (view === 'stock') renderStorage();
  document.getElementById('selection-footer').classList[view==='ccs' && selectedMaterials.size>0 ? 'remove' : 'add']('hidden');
  updateCartBadge();
}

// ===== FILTER =====
function setFilter(val) {
  currentFilter = val;
  document.querySelectorAll('.filter-btn').forEach(b => {
    b.classList.remove('bg-[#0f2d4a]','text-white');
    b.classList.add('text-gray-600','bg-white','border','border-gray-300');
  });
  const el = document.getElementById('filter-' + val);
  if (el) { el.classList.add('bg-[#0f2d4a]','text-white'); el.classList.remove('text-gray-600','bg-white','border','border-gray-300'); }
  // Show/hide custom date row
  const row = document.getElementById('custom-date-row');
  if (val === 'custom') {
    row.classList.remove('hidden');
    // Pre-fill defaults: today → today+14
    if (!document.getElementById('custom-from').value) {
      const from = new Date(TODAY), to = new Date(TODAY);
      to.setDate(to.getDate() + 14);
      document.getElementById('custom-from').value = from.toISOString().split('T')[0];
      document.getElementById('custom-to').value   = to.toISOString().split('T')[0];
    }
    // Don't re-render until Apply is clicked
    return;
  } else {
    row.classList.add('hidden');
    customStart = null; customEnd = null;
  }
  selectedMaterials.clear();
  renderCCList();
  updateStickyFooter();
}

function applyCustomFilter() {
  customStart = document.getElementById('custom-from').value;
  customEnd   = document.getElementById('custom-to').value;
  if (!customStart || !customEnd) return;
  selectedMaterials.clear();
  renderCCList();
  updateStickyFooter();
}

  if (chev) chev.classList.toggle('rotate-90', openStorageDevices.has(sdId));
}

// ===== SELECTION =====
function toggleSelectAll(checked) {
  getAllFilteredMatIds().forEach(id => checked ? selectedMaterials.add(id) : selectedMaterials.delete(id));
  document.querySelectorAll('.mat-cb').forEach(cb => cb.checked = checked);
  document.querySelectorAll('.cc-cb').forEach(cb => { cb.checked = checked; cb.indeterminate = false; });
  updateStickyFooter();
}

function toggleCC(ccId, checked) {
  const row = getFilteredCCs().find(r => r.cc.id === ccId);
  if (!row) return;
  row.cc.materials.forEach(mat => {
    checked ? selectedMaterials.add(mat.id) : selectedMaterials.delete(mat.id);
    const cb = document.getElementById('mat-cb-'+mat.id);
    if (cb) cb.checked = checked;
  });
  const ccCb = document.getElementById('cc-cb-'+ccId);
  if (ccCb) { ccCb.checked = checked; ccCb.indeterminate = false; }
  updateSelectAllCb();
  updateStickyFooter();
}

function toggleMaterial(matId, checked) {
  checked ? selectedMaterials.add(matId) : selectedMaterials.delete(matId);
  const r = findMat(matId); if (!r) return;
  const allSel = r.cc.materials.every(m => selectedMaterials.has(m.id));
  const someSel = r.cc.materials.some(m => selectedMaterials.has(m.id));
  const ccCb = document.getElementById('cc-cb-'+r.cc.id);
  if (ccCb) { ccCb.checked = allSel; ccCb.indeterminate = someSel && !allSel; }
  updateSelectAllCb();
  updateStickyFooter();
}

function updateSelectAllCb() {
  const all = getAllFilteredMatIds();
  const cb = document.getElementById('select-all-cb');
  if (!cb) return;
  const allSel = all.length > 0 && all.every(id => selectedMaterials.has(id));
  const someSel = all.some(id => selectedMaterials.has(id));
  cb.checked = allSel; cb.indeterminate = someSel && !allSel;
}

function updateStickyFooter() {
  const footer = document.getElementById('selection-footer');
  if (selectedMaterials.size === 0) { footer.classList.add('hidden'); return; }
  footer.classList.remove('hidden');
  const assignable = [...selectedMaterials].filter(id => { const r=findMat(id); return r && r.mat.qtyAssigned < r.mat.qtyReq; }).length;
  document.getElementById('selection-summary').textContent =
    selectedMaterials.size + ' item' + (selectedMaterials.size!==1?'s':'') + ' selected' +
    (assignable > 0 ? ' · ' + assignable + ' can be assigned from stock' : '');
}

// ===== BATCH ACTIONS =====
function batchAssignStock() {
  let n = 0;
  selectedMaterials.forEach(id => { const r=findMat(id); if(r && r.mat.qtyAssigned < r.mat.qtyReq){ r.mat.qtyAssigned=r.mat.qtyReq; n++; }});
  selectedMaterials.clear();
  renderCCList(); updateStickyFooter();
  if (n>0) showToast(n + ' item'+(n!==1?'s':'')+' assigned from stock');
}

function batchAddToOrder() {
  let n = 0;
  selectedMaterials.forEach(id => {
    if (cart.some(i => i.materialId===id)) return;
    const r = findMat(id); if (!r) return;
    const qty = r.mat.qtyReq - r.mat.qtyAssigned;
    if (qty > 0) { cart.push({materialId:id, jobId:r.job.id, ccId:r.cc.id, qty}); n++; }
  });
  selectedMaterials.clear();
  updateCartBadge(); renderCCList(); updateStickyFooter();
  if (n>0) showToast(n + ' item'+(n!==1?'s':'')+' added to order');
}

// ===== RENDER CC LIST =====
function renderCCList() {
  const filtered = getFilteredCCs();

  // Count excluded CCs (for the hint)
  let excStart, excEnd;
  if (currentFilter === 'custom' && customStart && customEnd) {
    excStart = new Date(customStart+'T00:00:00'); excEnd = new Date(customEnd+'T00:00:00');
  } else {
    excStart = new Date(TODAY); excEnd = new Date(TODAY); excEnd.setDate(excEnd.getDate()+(currentFilter===99?365:currentFilter));
  }
  let excluded = 0;
  jobs.forEach(job => job.costCentres.forEach(cc => {
    const d = new Date(cc.scheduledDate+'T00:00:00');
    if (d < excStart || d > excEnd) excluded++;
  }));

  const totalItems = filtered.reduce((s,{cc})=>s+cc.materials.filter(m=>m.qtyReq-m.qtyAssigned>0).length, 0);

      </div>
      ${excluded>0 ? `<div class="ml-auto px-5 text-xs text-gray-400 italic">${excluded} cost centre${excluded!==1?'s':''} outside filter range — not shown</div>` : ''}

    document.getElementById('cc-list').innerHTML=`<div class="bg-white rounded-xl border border-gray-200 p-14 text-center shadow-sm"><p class="text-gray-500 font-semibold">No cost centres scheduled in this period</p><p class="text-gray-400 text-sm mt-1">Try a wider date filter.</p></div>`;

  }

  document.getElementById('cc-list').innerHTML = filtered.map(({cc, job}) => {

      const qty = mat.qtyReq - mat.qtyAssigned;

      return `

          <td class="pl-12 pr-3 py-2.5">
            <input type="checkbox" id="mat-cb-${mat.id}" class="mat-cb w-4 h-4 rounded border-gray-300 text-blue-600 cursor-pointer" ${selectedMaterials.has(mat.id)?'checked':''} onchange="toggleMaterial('${mat.id}',this.checked)">

              ? '<span class="text-xs text-green-600">&#10003; Complete</span>'
              : `<div class="flex items-center justify-end gap-1.5">
                  <button onclick="assignSingle('${mat.id}','${job.id}','${cc.id}')" class="text-xs px-2 py-1 bg-green-50 border border-green-200 text-green-700 rounded hover:bg-green-100">Assign Stock</button>
                  ${inCart
                    ? '<span class="text-xs px-2 py-1 bg-yellow-100 text-yellow-700 rounded font-semibold">In Order &#10003;</span>'
                    : `<button onclick="addSingle('${mat.id}','${job.id}','${cc.id}')" class="text-xs px-2 py-1 bg-blue-600 text-white rounded hover:bg-blue-700">Add to Order</button>`}
                </div>`}
          </td>
        </tr>`;
    }).join('');

    return `
      <div class="bg-white rounded-xl border border-gray-200 shadow-sm mb-3 overflow-hidden">
        <div class="flex items-center gap-3 px-4 py-3 bg-gray-50 border-b border-gray-200 cursor-pointer hover:bg-gray-100 select-none" onclick="toggleExpand('${cc.id}')">
          <div onclick="event.stopPropagation()">
            <input type="checkbox" id="cc-cb-${cc.id}" class="cc-cb w-4 h-4 rounded border-gray-400 text-blue-600 cursor-pointer" ${allSel?'checked':''} onchange="event.stopPropagation();toggleCC('${cc.id}',this.checked)">
          </div>
          <svg id="chev-${cc.id}" class="w-4 h-4 text-gray-400 flex-shrink-0 transition-transform duration-150 ${isCollapsed?'':'rotate-90'}" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
          <div class="flex-1 flex items-center gap-3 min-w-0 flex-wrap">
            <span class="font-bold text-gray-900">${cc.name}</span>
            <span class="text-xs text-gray-400 font-mono">${cc.id}</span>
            <span class="text-xs font-semibold text-blue-600 bg-blue-50 px-2 py-0.5 rounded">${job.id}</span>
            <span class="text-gray-500 text-sm truncate">${job.address}</span>
          </div>
          <div class="flex items-center gap-4 flex-shrink-0 text-xs">
            <span class="text-gray-500 font-medium">${fmtDate(cc.scheduledDate)}</span>
            <span class="text-gray-400">&#128100; ${job.tech}</span>
            ${toOrder.length>0
              ? `<span class="flex items-center gap-1 font-semibold text-orange-600 bg-orange-50 px-2.5 py-1 rounded-full"><span class="w-1.5 h-1.5 bg-orange-400 rounded-full"></span>${toOrder.length} to order</span>`
              : `<span class="font-semibold text-green-600 bg-green-50 px-2.5 py-1 rounded-full">&#10003; Complete</span>`}
          </div>
        </div>
        <div id="cc-body-${cc.id}" class="${isCollapsed?'hidden':''}">
          <table class="w-full text-sm">
            <thead>
              <tr class="border-b border-gray-100 bg-white">
                <th class="pl-12 pr-3 py-2"></th>
                <th class="px-3 py-2 text-left text-xs font-medium text-gray-400 uppercase">Item</th>
                <th class="px-3 py-2 text-center text-xs font-medium text-gray-400 uppercase">Req'd</th>
                <th class="px-3 py-2 text-center text-xs font-medium text-gray-400 uppercase">Assigned</th>
                <th class="px-3 py-2 text-center text-xs font-medium text-gray-400 uppercase">To Order</th>
                <th class="px-3 py-2 text-left text-xs font-medium text-gray-400 uppercase">Supplier</th>
                <th class="px-3 py-2 text-right text-xs font-medium text-gray-400 uppercase">Est. Cost</th>
                <th class="px-3 py-2 pr-4"></th>
              </tr>
            </thead>
            <tbody>${matRows}</tbody>
          </table>
        </div>
      </div>`;
  }).join('');

  // Fix indeterminate state (can't set via HTML attr)
  getFilteredCCs().forEach(({cc}) => {
    const allSel = cc.materials.every(m => selectedMaterials.has(m.id));
    const someSel = cc.materials.some(m => selectedMaterials.has(m.id));
    const cb = document.getElementById('cc-cb-'+cc.id);
    if (cb) cb.indeterminate = someSel && !allSel;
  });
  updateSelectAllCb();
}

function toggleExpand(ccId) {
  if (collapsedCCs.has(ccId)) { collapsedCCs.delete(ccId); } else { collapsedCCs.add(ccId); }
  const body = document.getElementById('cc-body-'+ccId);
  const chev = document.getElementById('chev-'+ccId);
  if (body) body.classList.toggle('hidden', collapsedCCs.has(ccId));
  if (chev) chev.classList.toggle('rotate-90', !collapsedCCs.has(ccId));
}

function assignSingle(matId, jobId, ccId) {
  const r = findMat(matId); if (!r) return;
  r.mat.qtyAssigned = r.mat.qtyReq;
  renderCCList();
}

function addSingle(matId, jobId, ccId) {
  if (cart.some(i => i.materialId===matId)) return;
  const r = findMat(matId); if (!r) return;
  const qty = r.mat.qtyReq - r.mat.qtyAssigned;
  if (qty>0) { cart.push({materialId:matId, jobId, ccId, qty}); updateCartBadge(); renderCCList(); }
}

// ===== BULK ORDER =====
function renderBulkOrder() {
  const el = document.getElementById('bulk-order-content');
  if (cart.length===0) {
    el.innerHTML=`<div class="bg-white rounded-xl border border-gray-200 p-14 text-center shadow-sm"><div class="text-5xl mb-3">&#128230;</div><p class="text-gray-500 font-semibold">No items in order yet</p><p class="text-gray-400 text-sm mt-1">Select materials from Scheduled Cost Centres and add them to your order.</p><button onclick="navigate('ccs')" class="mt-4 text-sm text-blue-600 hover:text-blue-800 font-semibold">View Scheduled CCs &rarr;</button></div>`;
    return;
  }
  const bySupplier = {};
  cart.forEach(item => {
    const r = findMat(item.materialId); if(!r) return;
    if (!bySupplier[r.mat.supplier]) bySupplier[r.mat.supplier] = {email:r.mat.supplierEmail, items:[]};
    bySupplier[r.mat.supplier].items.push({...item, mat:r.mat, job:r.job, cc:r.cc});
  });
  el.innerHTML = `<p class="text-sm text-gray-500 mb-4">${cart.length} item${cart.length!==1?'s':''} across ${Object.keys(bySupplier).length} supplier${Object.keys(bySupplier).length!==1?'s':''}</p>` +
    Object.entries(bySupplier).map(([supplier, data]) => {
      const total = data.items.reduce((s,i)=>s+i.qty*i.mat.unitCost,0);
      return `<div class="bg-white rounded-xl border border-gray-200 shadow-sm mb-4 overflow-hidden">
        <div class="px-5 py-3 bg-gray-50 border-b border-gray-200 flex items-center justify-between">
          <div><span class="font-bold text-gray-800">${supplier}</span><span class="ml-2 text-xs text-gray-400">${data.email}</span></div>
          <div class="flex items-center gap-4"><span class="font-semibold text-gray-700">Total: $${total.toFixed(2)}</span>
            <button onclick="showSendModal('${supplier}')" class="text-sm bg-blue-600 hover:bg-blue-700 text-white font-semibold px-4 py-2 rounded-lg">Review &amp; Send PO &rarr;</button>
          </div>
        </div>
        <table class="w-full text-sm"><thead><tr class="border-b border-gray-100">
          <th class="px-5 py-2 text-left text-xs font-medium text-gray-400 uppercase">Item</th>
          <th class="px-5 py-2 text-left text-xs font-medium text-gray-400 uppercase">Job / CC</th>
          <th class="px-5 py-2 text-left text-xs font-medium text-gray-400 uppercase">Qty</th>
          <th class="px-5 py-2 text-left text-xs font-medium text-gray-400 uppercase">Unit</th>
          <th class="px-5 py-2 text-left text-xs font-medium text-gray-400 uppercase">Total</th>
          <th class="px-5 py-2"></th>
        </tr></thead><tbody>
          ${data.items.map(i=>`<tr class="border-b border-gray-50 hover:bg-gray-50">
            <td class="px-5 py-2.5 text-gray-800">${i.mat.desc}</td>
            <td class="px-5 py-2.5 text-gray-500">${i.job.id} / ${i.cc.name}</td>
            <td class="px-5 py-2.5"><input type="number" value="${i.qty}" min="1" onchange="updateCartQty('${i.materialId}',this.value)" class="w-16 border border-gray-300 rounded px-2 py-1 text-sm text-center focus:outline-none focus:border-blue-400"></td>
            <td class="px-5 py-2.5 text-gray-500">$${i.mat.unitCost.toFixed(2)}</td>
            <td class="px-5 py-2.5 font-semibold text-gray-800">$${(i.qty*i.mat.unitCost).toFixed(2)}</td>
            <td class="px-5 py-2.5 text-right"><button onclick="removeFromCart('${i.materialId}')" class="text-xs text-red-400 hover:text-red-600 font-medium">Remove</button></td>
          </tr>`).join('')}
        </tbody></table>
      </div>`;
    }).join('');
}

function updateCartQty(matId, val) { const i=cart.find(x=>x.materialId===matId); if(i) i.qty=Math.max(1,parseInt(val)||1); updateCartBadge(); }
function removeFromCart(matId) { cart=cart.filter(i=>i.materialId!==matId); updateCartBadge(); renderBulkOrder(); }

// ===== SEND PO MODAL =====
function showSendModal(supplier) {
  const bySupplier = {};
  cart.forEach(item => {
    const r = findMat(item.materialId); if(!r) return;
    if (!bySupplier[r.mat.supplier]) bySupplier[r.mat.supplier]={email:r.mat.supplierEmail,items:[]};
    bySupplier[r.mat.supplier].items.push({...item,mat:r.mat,job:r.job,cc:r.cc});
  });
  const data = bySupplier[supplier]; if(!data) return;
  const poRef = 'PO-' + poCounter;
  const total = data.items.reduce((s,i)=>s+i.qty*i.mat.unitCost,0);
  const todayStr = new Date().toLocaleDateString('en-NZ',{day:'numeric',month:'long',year:'numeric'});
  const affJobs = [...new Set(data.items.map(i=>i.jobId))];
  const affCCs  = data.items.map(i=>({jobId:i.jobId,ccId:i.ccId,ccName:i.cc.name}));
  const body = `Hi ${supplier} team,\n\nPlease find our purchase order below:\n\nPurchase Order: ${poRef}\nDate: ${todayStr}\nAccount: R&L Plumbing Ltd\n\nITEMS:\n${data.items.map(i=>`  - ${i.mat.desc}  Qty: ${i.qty}  Unit: $${i.mat.unitCost.toFixed(2)}  Total: $${(i.qty*i.mat.unitCost).toFixed(2)}`).join('\n')}\n\nORDER TOTAL: $${total.toFixed(2)} + GST\n\nPlease confirm receipt and advise expected delivery date.\n\nRegards,\nBilliejean\nR&L Plumbing Ltd\nprocurement@rlplumb.co.nz`;

  document.getElementById('modal-content').innerHTML = `
    <div class="px-6 py-4 border-b border-gray-200 flex items-center justify-between">
      <div><h2 class="text-lg font-bold text-gray-900">Review &amp; Send Purchase Order</h2><p class="text-sm text-gray-400 mt-0.5">${poRef} &rarr; ${supplier}</p></div>
      <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600 text-2xl">&times;</button>
    </div>
    <div class="p-6">
      <div class="grid grid-cols-2 gap-4 mb-4">
        <div><label class="block text-xs font-semibold text-gray-400 uppercase mb-1.5">To</label><input value="${data.email}" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-blue-400"></div>
        <div><label class="block text-xs font-semibold text-gray-400 uppercase mb-1.5">Subject</label><input value="Purchase Order ${poRef} – R&amp;L Plumbing Ltd" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-blue-400"></div>
      </div>
      <div class="mb-4"><label class="block text-xs font-semibold text-gray-400 uppercase mb-1.5">Email Body</label><textarea rows="12" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-xs font-mono text-gray-700 resize-none focus:outline-none focus:border-blue-400">${body}</textarea></div>
      <div class="bg-blue-50 border border-blue-200 rounded-xl p-4 mb-5 text-sm text-blue-700 space-y-1.5">
        <p class="text-xs font-bold text-blue-700 uppercase mb-2">On Send — happens automatically:</p>
        <div class="flex gap-2"><span>&#10003;</span><span>Email sent to <strong>${supplier}</strong></span></div>
        <div class="flex gap-2"><span>&#10003;</span><span>PO <strong>${poRef}</strong> status &rarr; <strong>Sent</strong> in SimPro</span></div>
        ${affJobs.map(jId=>`<div class="flex gap-2"><span>&#10003;</span><span>Note added to Job <strong>${jId}</strong> in SimPro</span></div>`).join('')}
        ${affCCs.map(c=>`<div class="flex gap-2"><span>&#10003;</span><span>Task created: <strong>${c.ccId} – ${c.ccName}</strong> (${c.jobId}) in SimPro + Monday.com</span></div>`).join('')}
        ${affCCs.map(c=>`<div class="flex gap-2"><span>&#10003;</span><span>Task <strong>${c.ccId}</strong> closed (PO sent trigger)</span></div>`).join('')}
      </div>
      <div class="flex justify-end gap-3">
        <button onclick="closeModal()" class="text-sm px-4 py-2 border border-gray-300 rounded-lg text-gray-600 hover:bg-gray-50">Cancel</button>
        <button onclick="sendPO('${supplier}','${poRef}')" class="text-sm px-5 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 font-bold">Send Order &rarr;</button>
      </div>
    </div>`;
  document.getElementById('modal-overlay').classList.remove('hidden');
}

function closeModal() { document.getElementById('modal-overlay').classList.add('hidden'); }
function handleOverlayClick(e) { if(e.target===document.getElementById('modal-overlay')) closeModal(); }

function sendPO(supplier, poRef) {
  const bySupplier = {};
  cart.forEach(item => {
    const r=findMat(item.materialId); if(!r) return;
    if(!bySupplier[r.mat.supplier]) bySupplier[r.mat.supplier]={items:[]};
    bySupplier[r.mat.supplier].items.push({...item,mat:r.mat,job:r.job,cc:r.cc});
  });
  const data = bySupplier[supplier]; if(!data) return;
  const now = new Date();
  const ts = now.toLocaleDateString('en-NZ',{day:'numeric',month:'short',year:'numeric'})+' '+now.toLocaleTimeString('en-NZ',{hour:'2-digit',minute:'2-digit'});
  const affJobs=[...new Set(data.items.map(i=>i.jobId))];
  const affCCs=data.items.map(i=>({jobId:i.jobId,ccId:i.ccId,ccName:i.cc.name}));
  affJobs.forEach(jId => { const job=jobs.find(j=>j.id===jId); if(job) job.notes.push({id:'n'+Date.now()+jId, text:`${poRef} sent to ${supplier}. Raised by Billiejean. ${ts}.`, author:'System', timestamp:ts, type:'auto'}); });
  const sentIds = data.items.map(i=>i.materialId);
  cart = cart.filter(i=>!sentIds.includes(i.materialId));
  poCounter++; updateCartBadge();
  document.getElementById('modal-content').innerHTML = `
    <div class="p-10 text-center">
      <div class="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4"><svg class="w-9 h-9 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"/></svg></div>
      <h2 class="text-xl font-extrabold text-gray-900 mb-1">Order Sent!</h2>
      <p class="text-gray-400 text-sm mb-6">${poRef} sent to ${supplier}</p>
      <div class="text-left bg-gray-50 border border-gray-200 rounded-xl p-4 mb-6 space-y-2 text-sm">
        <div class="flex gap-2 text-green-700"><span>&#9989;</span><span>Email sent to <strong>${supplier}</strong></span></div>
        <div class="flex gap-2 text-green-700"><span>&#9989;</span><span>PO <strong>${poRef}</strong> &rarr; <strong>Sent</strong> in SimPro</span></div>
        ${affJobs.map(jId=>`<div class="flex gap-2 text-green-700"><span>&#9989;</span><span>Note added to Job <strong>${jId}</strong></span></div>`).join('')}
        ${affCCs.map(c=>`<div class="flex gap-2 text-green-700"><span>&#9989;</span><span>Task created: <strong>${c.ccId} – ${c.ccName}</strong> in SimPro + Monday.com</span></div>`).join('')}
        ${affCCs.map(c=>`<div class="flex gap-2 text-green-700"><span>&#9989;</span><span>Task <strong>${c.ccId}</strong> closed</span></div>`).join('')}
      </div>
      <div class="flex justify-center gap-3">
        <button onclick="closeModal();navigate('ccs')" class="text-sm px-4 py-2 border border-gray-300 rounded-lg text-gray-600 hover:bg-gray-50">Back to Cost Centres</button>
        <button onclick="closeModal();navigate('bulk-order')" class="text-sm px-5 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 font-semibold">Continue Ordering</button>
      </div>
    </div>`;
}

// ===== INIT =====
document.getElementById('today-display').textContent = TODAY.toLocaleDateString('en-NZ',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
navigate('ccs');
</script>
</body>
</html>
